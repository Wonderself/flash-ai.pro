server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/css text/javascript application/javascript text/html text/xml application/json;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Language subfolders — serve their index.html
    location /fr/ {
        try_files $uri $uri/index.html /fr/index.html;
    }
    location /es/ {
        try_files $uri $uri/index.html /es/index.html;
    }

    # All other pages — explicit html fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
